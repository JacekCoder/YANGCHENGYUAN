<footer class="footer border-top py-2 mt-5 bg-white small">
    <div class="{% if page.container_class %}{{ page.container_class }}{% else %}container-lg{% endif %}">
        <div class="row my-3">
            <div class="col-6">
                <div class="text-muted">
                    <i>Last updated: {{ "now" | date: "%b %Y" }}</i>
                </div>
            </div>
            <div class="col-6">
                <div class="text-right text-muted">
                    {{ site.data.display.footer_text }}
                    <!-- MapMyVisitors visitor map: records & maps where visitors come from -->
                    <div class="mapmyvisitors-widget">
                        <script type="text/javascript" id="mapmyvisitors"
                                src="https://mapmyvisitors.com/map.js?d=nQC_p7cc_y3p507qCrBdZRmSc7c7kJ0UrZm6GAtL0Dk&cl=ffffff&w=150"></script>
                        <noscript>
                            <a href="https://mapmyvisitors.com/web/1byxf" title="Visitor map">
                                <img src="https://mapmyvisitors.com/map.png?d=nQC_p7cc_y3p507qCrBdZRmSc7c7kJ0UrZm6GAtL0Dk&cl=ffffff&w=150" alt="Visitor map">
                            </a>
                        </noscript>
                    </div>
                </div>
            </div>
        </div>
    </div>
</footer>
