short_bio: >-
  <p>
    I am a Master's student in Mechanical Engineering at <strong>Nanyang Technological University</strong> (NTU), Singapore,
    where I am supervised by <a href="https://dr.ntu.edu.sg/entities/person/Ang-Wei-Tech" target="_blank" rel="noopener">Prof. Ang Wei Tech</a>,
    Director of the Robotics Research Centre (RRC), in its
    <a href="https://www.ntu.edu.sg/rrc/robotics-research-centre-labs/assistive-robotics-lab" target="_blank" rel="noopener">Assistive Robotics Lab</a>.
    I received my B.Eng. in Mechanical Engineering from
    <strong>South China University of Technology</strong> (SCUT) in 2024.
  </p>
  <p class="mb-2">
    My research lies at the intersection of <strong>Robotics</strong> and
    <strong>Physical Human-Robot Interaction (pHRI)</strong>. My interests span:
  </p>
  <ul class="mb-0">
    <li><strong>Physics-based</strong> &amp; <strong>human-in-the-loop</strong> simulation</li>
    <li><strong>System identification</strong> &amp; Real2Sim modeling</li>
    <li><strong>Control systems</strong> &amp; <strong>reinforcement learning</strong></li>
  </ul>

