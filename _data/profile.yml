short_bio: >-
  <p>
    I am an M.Sc. student in Mechanical Engineering at <strong>Nanyang Technological University</strong> (NTU), Singapore.
    I received my B.Eng. in Mechanical Engineering from <strong>South China University of Technology</strong> (SCUT) in 2024.
  </p>
  <p>
    My research focuses on <strong>Robotics</strong>, <strong>Physical Human-Robot Interaction (pHRI)</strong>,
    and <strong>Control Systems</strong>. I am currently working on personalized soft-body simulation
    and standardized Real2Sim pipelines for ergonomic gait assistance and rehabilitation robotics.
  </p>

